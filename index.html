<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My GitHub Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 100px;
      padding: 20px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      max-width: 600px;
      margin: 10px auto;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: white;
      color: #0077ff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .button:hover {
      background: #0077ff;
      color: white;
    }

    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Hello, World!</h1>
    <p>Welcome to my GitHub website. It may look simple, but hey… you're here!</p>

    <a href="#" class="button">Click Me (it does nothing)</a>
  </div>

  <footer>
    <p>Thanks for visiting</p>
  </footer>

</body>
</html>
